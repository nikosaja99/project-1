<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Time Skip</title>

    <!-- PWA -->
    <meta name="theme-color" content="#121212">
    <link rel="manifest" href="./manifest.json">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-full flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/40 via-slate-950 to-slate-950 antialiased">

<div class="w-full max-w-md bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] rounded-3xl p-6 sm:p-8 shadow-2xl">

    <!-- DAY SELECTOR -->
    <div class="mb-4">
        <div id="dayContainer" class="flex gap-2 overflow-x-auto whitespace-nowrap pb-2"></div>
    </div>

    <!-- TITLE -->
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2">
            <h1 class="text-3xl font-extrabold tracking-widest bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent uppercase">
                Time Skip
            </h1>

            <span id="selectedDayLabel"
                class="text-xs font-mono px-2 py-1 rounded-md bg-slate-900/60 border border-white/[0.05] text-slate-300">
                Day - 1
            </span>
        </div>

        <p class="text-xs text-slate-400 mt-1">
            Kelola waktu dan tugas Anda
        </p>
    </div>

    <!-- PROGRESS -->
    <div class="flex justify-between items-end mb-3 px-1">
        <span class="text-xs font-semibold uppercase text-indigo-400">Progress</span>
        <div id="progressText" class="text-sm font-mono text-slate-300 bg-slate-900/60 px-2 py-1 rounded">
            0 / 0
        </div>
    </div>

    <div class="w-full h-3 bg-slate-900 rounded-full overflow-hidden mb-8">
        <div id="progressFill" class="h-full w-0 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 transition-all"></div>
    </div>

    <!-- TASK -->
    <div id="taskList" class="space-y-3 max-h-[350px] overflow-y-auto pr-1"></div>

</div>

<!-- SCRIPT APP -->
<script src="./script.js"></script>

<!-- SERVICE WORKER (FIXED) -->
<script>
window.addEventListener("load", () => {
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js");
    }
});
</script>

</body>
</html>
