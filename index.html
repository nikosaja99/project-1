<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Time Skip</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>
<body class="min-h-full flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/40 via-slate-950 to-slate-950 antialiased selection:bg-indigo-500/30">

<div class="w-full max-w-md bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] rounded-3xl p-6 sm:p-8 shadow-2xl shadow-indigo-950/20">
<div class="mb-4">
    <div id="dayContainer" class="flex gap-2 overflow-x-auto whitespace-nowrap pb-2"></div>
</div>
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2">
    <h1 class="text-3xl font-extrabold tracking-widest bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent uppercase drop-shadow-sm">
        Time Skip
    </h1>

    <span id="selectedDayLabel"
        class="text-xs font-mono px-2 py-1 rounded-md bg-slate-900/60 border border-white/[0.05] text-slate-300">
        Day - 0
    </span>
</div>
        <p class="text-xs text-slate-400/80 mt-1 tracking-wide">Kelola waktu dan tugas Anda dengan elegan</p>
    </div>

    <div class="flex justify-between items-end mb-3 px-1">
        <span class="text-xs font-semibold uppercase tracking-wider text-indigo-400">Progress Tugas</span>
        <div id="progressText" class="text-sm font-medium font-mono text-slate-300 bg-slate-900/60 px-2.5 py-1 rounded-md border border-white/[0.05]">
            0 / 0 Selesai
        </div>
    </div>

    <div class="w-full h-3 bg-slate-900/80 rounded-full overflow-hidden p-[2px] border border-white/[0.05] mb-8">
        <div id="progressFill" class="h-full w-0 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-full transition-all duration-500 ease-out shadow-[0_0_12px_rgba(99,102,241,0.4)]"></div>
    </div>

    <div class="space-y-3">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 block px-1 mb-2">Daftar Tugas</span>
        <div id="taskList" class="space-y-3 max-h-[350px] overflow-y-auto pr-1 scrollbar-thin scrollbar-thumb-slate-800">
            </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
